<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>ResumSync — Application Tracker</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Lora:ital,wght@1,500;1,600&family=Space+Mono:wght@400;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<script src="resumsync-store.js"></script>
<style>
:root{
  --bg:#071512;--bg-2:#0a1b16;--panel:#0c2019;--panel-2:#0f271e;
  --ink:#ecf4ee;--ink2:#9fb6a8;--ink3:#6e8a7b;
  --mint:#7ad79f;--mint-bright:#94e6b1;--mint-deep:#4fae7a;
  --mint-dim:rgba(122,215,159,0.10);--mint-dim2:rgba(122,215,159,0.16);--mint-border:rgba(122,215,159,0.22);
  --amber:#e0a14a;--blue:#6fb1e0;
  --line:rgba(159,182,168,0.12);--line-2:rgba(159,182,168,0.07);
  --shadow-lg:0 24px 60px rgba(0,0,0,0.45),0 4px 14px rgba(0,0,0,0.35);
  --mono:'Space Mono',ui-monospace,monospace;--display:'Bricolage Grotesque',system-ui,sans-serif;
  --serif:'Lora',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(900px 600px at 70% -10%, rgba(122,215,159,0.06), transparent 60%);}
.app{position:relative;z-index:1;display:grid;grid-template-columns:248px 1fr;min-height:100vh;}

/* NAV */
.side{background:var(--bg-2);border-right:1px solid var(--line-2);padding:24px 18px;display:flex;flex-direction:column;gap:22px;position:sticky;top:0;height:100vh;}
.brand-mark{display:flex;align-items:center;gap:11px;text-decoration:none;color:inherit;padding:0 6px;}
.brand-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(150deg,var(--mint),var(--mint-deep));display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:16px;color:#06140f;box-shadow:0 4px 12px rgba(122,215,159,0.28);}
.brand-name{font-family:var(--display);font-weight:700;font-size:17px;letter-spacing:-0.02em;}
.brand-tag{font-family:var(--mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink3);margin-top:2px;}
.nav{display:flex;flex-direction:column;gap:3px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;text-decoration:none;color:var(--ink2);font-size:13.5px;font-weight:500;transition:all .15s;}
.nav-item:hover{background:var(--mint-dim);color:var(--ink);}
.nav-item.on{background:var(--mint-dim2);color:var(--mint);}
.nav-item svg{width:17px;height:17px;flex:0 0 17px;}
.nav-sec{font-family:var(--mono);font-size:9.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink3);padding:0 12px;margin-bottom:4px;}
.side-foot{margin-top:auto;}
.cta-side{display:block;text-align:center;background:var(--mint);color:#06140f;font-weight:600;font-size:13px;padding:12px;border-radius:10px;text-decoration:none;box-shadow:0 8px 20px rgba(122,215,159,0.2);transition:all .15s;}
.cta-side:hover{background:var(--mint-bright);transform:translateY(-1px);}

/* MAIN */
.main{padding:30px 40px 60px;max-width:1180px;}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:26px;}
.page-head h1{font-family:var(--display);font-weight:800;font-size:30px;letter-spacing:-0.025em;line-height:1;}
.page-head p{font-size:13.5px;color:var(--ink2);margin-top:8px;}
.head-actions{display:flex;gap:10px;}
.btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--sans);font-size:13.5px;font-weight:600;padding:11px 18px;border-radius:10px;border:none;cursor:pointer;text-decoration:none;transition:all .15s;}
.btn-mint{background:var(--mint);color:#06140f;box-shadow:0 8px 20px rgba(122,215,159,0.2);}
.btn-mint:hover{background:var(--mint-bright);transform:translateY(-1px);}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink);}
.btn-ghost:hover{border-color:var(--mint-border);background:var(--mint-dim);}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px;}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;}
.stat .v{font-family:var(--display);font-weight:800;font-size:28px;line-height:1;}
.stat .l{font-family:var(--mono);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink3);margin-top:9px;}
.stat .v.mint{color:var(--mint);}
.stat .v.amber{color:var(--amber);}
.stat .v.blue{color:var(--blue);}

/* TABLE */
.table-card{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden;}
.table-top{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--line-2);}
.table-title{font-family:var(--display);font-weight:700;font-size:16px;}
.filters{display:flex;gap:6px;}
.filter{font-family:var(--sans);font-size:12px;font-weight:500;color:var(--ink2);padding:6px 12px;border-radius:99px;border:1px solid var(--line);background:transparent;cursor:pointer;transition:all .15s;}
.filter.on{border-color:var(--mint-border);background:var(--mint-dim);color:var(--mint);}
.filter:hover{border-color:var(--mint-border);}
table{width:100%;border-collapse:collapse;}
thead th{font-family:var(--mono);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink3);text-align:left;padding:14px 22px;border-bottom:1px solid var(--line-2);font-weight:400;}
thead th.center{text-align:center;}
tbody tr{border-bottom:1px solid var(--line-2);transition:background .12s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(255,255,255,0.014);}
tbody td{padding:16px 22px;font-size:13.5px;color:var(--ink2);vertical-align:middle;}
.role-cell{display:flex;align-items:center;gap:13px;}
.co-logo{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:15px;color:#fff;flex:0 0 38px;}
.role-t{font-size:14px;font-weight:600;color:var(--ink);}
.role-c{font-size:12px;color:var(--ink3);margin-top:1px;}
.score-cell{display:flex;align-items:center;gap:9px;justify-content:center;}
.score-num{font-family:var(--display);font-weight:800;font-size:17px;color:var(--ink);}
.score-up{font-family:var(--mono);font-size:10.5px;color:var(--mint);background:var(--mint-dim);padding:2px 6px;border-radius:5px;}
/* file lines */
.files{display:flex;flex-direction:column;gap:6px;min-width:220px;}
.file-line{display:flex;align-items:center;gap:8px;font-size:12px;}
.file-line .fic{width:22px;height:22px;border-radius:6px;flex:0 0 22px;display:grid;place-items:center;border:1px solid var(--line);color:var(--ink3);}
.file-line .fic svg{width:12px;height:12px;}
.file-line.has .fic{color:var(--mint);border-color:var(--mint-border);background:var(--mint-dim);}
.fname{color:var(--ink);font-weight:500;max-width:148px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono);font-size:11px;}
.fname.none{color:var(--ink3);font-style:normal;font-family:var(--sans);font-size:11.5px;}
.sent-badge{font-family:var(--mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;padding:2px 7px;border-radius:5px;white-space:nowrap;}
.sent-badge.yes{color:var(--mint);background:var(--mint-dim);border:1px solid var(--mint-border);}
.sent-badge.no{color:var(--ink3);background:rgba(159,182,168,0.08);border:1px solid var(--line);}
.expand-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--ink2);cursor:pointer;transition:all .15s;display:grid;place-items:center;}
.expand-btn:hover{border-color:var(--mint-border);background:var(--mint-dim);color:var(--ink);}
.expand-btn svg{width:15px;height:15px;transition:transform .2s;}
tr.expanded .expand-btn svg{transform:rotate(180deg);}
/* detail row */
.detail-row td{padding:0 22px 0;border-bottom:1px solid var(--line-2);background:rgba(255,255,255,0.012);}
.detail-inner{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:6px 0 22px;}
.doc-detail{background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:16px 18px;}
.dd-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.dd-kind{font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink3);}
.dd-file{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.dd-file .dfi{width:32px;height:32px;border-radius:8px;flex:0 0 32px;display:grid;place-items:center;background:var(--mint-dim);border:1px solid var(--mint-border);color:var(--mint);}
.dd-file .dfi svg{width:15px;height:15px;}
.dd-fname{font-size:13px;font-weight:600;color:var(--ink);word-break:break-all;line-height:1.3;}
.dd-loc{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--ink2);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:12px;}
.dd-loc .lic{color:var(--ink3);flex:0 0 13px;}
.dd-loc .lpath{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dd-copy{background:transparent;border:none;color:var(--mint);cursor:pointer;font-family:var(--mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;padding:2px 4px;}
.dd-copy:hover{color:var(--mint-bright);}
.dd-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.dd-status{font-size:12px;color:var(--ink2);}
.dd-status b{color:var(--mint);font-weight:600;}
.dd-status .muted{color:var(--ink3);}
.mark-sent{font-family:var(--sans);font-size:12px;font-weight:600;color:#06140f;background:var(--mint);border:none;border-radius:8px;padding:8px 14px;cursor:pointer;transition:all .15s;}
.mark-sent:hover{background:var(--mint-bright);transform:translateY(-1px);}
.dd-empty{display:flex;flex-direction:column;align-items:flex-start;gap:10px;color:var(--ink3);font-size:12.5px;}
.dd-gen{font-family:var(--sans);font-size:12px;font-weight:600;color:var(--mint);background:var(--mint-dim);border:1px solid var(--mint-border);border-radius:8px;padding:8px 14px;cursor:pointer;text-decoration:none;display:inline-block;transition:all .15s;}
.dd-gen:hover{background:var(--mint-dim2);}
/* clickable status pill + stage menu */
.status{cursor:pointer;border:1px solid transparent;transition:filter .12s,border-color .12s;}
.status:hover{filter:brightness(1.12);border-color:currentColor;}
.status .caret{font-size:9px;opacity:0.7;margin-left:1px;}
.status-menu{position:fixed;z-index:80;background:var(--panel-2);border:1px solid var(--line);border-radius:11px;padding:6px;box-shadow:var(--shadow-lg);min-width:172px;}
.status-menu .sm-h{font-family:var(--mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink3);padding:6px 10px 8px;}
.status-menu button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;border:none;color:var(--ink2);font-family:var(--sans);font-size:13px;font-weight:500;padding:9px 10px;border-radius:8px;cursor:pointer;transition:background .12s;}
.status-menu button:hover{background:var(--mint-dim);color:var(--ink);}
.status-menu button.cur{color:var(--ink);}
.status-menu button .sd{width:8px;height:8px;border-radius:50%;flex:0 0 8px;}
.status-menu button .ck{margin-left:auto;color:var(--mint);font-size:11px;}
/* search */
.search{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:8px 12px;transition:border-color .15s;}
.search:focus-within{border-color:var(--mint-border);}
.search svg{width:15px;height:15px;color:var(--ink3);flex:0 0 15px;}
.search input{background:none;border:none;outline:none;color:var(--ink);font-family:var(--sans);font-size:13px;width:180px;}
.search input::placeholder{color:var(--ink3);}
.table-tools{display:flex;align-items:center;gap:12px;}
/* sortable headers */
th.sortable{cursor:pointer;user-select:none;transition:color .12s;white-space:nowrap;}
th.sortable:hover{color:var(--ink2);}
th .sort-ind{display:inline-block;margin-left:5px;opacity:0;transition:opacity .12s;font-size:9px;}
th.sortable.act{color:var(--mint);}
th.sortable.act .sort-ind{opacity:1;}
.applied-cell{font-family:var(--mono);font-size:11.5px;color:var(--ink2);white-space:nowrap;}
.applied-cell .none{color:var(--ink3);}
.status{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;padding:6px 12px;border-radius:99px;}
.status .d{width:6px;height:6px;border-radius:50%;background:currentColor;}
.row-act{text-align:right;}
.kebab{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--ink2);cursor:pointer;transition:all .15s;font-size:15px;}
.kebab:hover{border-color:var(--mint-border);background:var(--mint-dim);color:var(--ink);}
.new-badge{display:inline-block;font-family:var(--mono);font-size:8.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--mint);background:var(--mint-dim);border:1px solid var(--mint-border);padding:2px 6px;border-radius:5px;margin-left:8px;vertical-align:middle;}

/* empty */
.empty{padding:64px 22px;text-align:center;}
.empty .ei{width:56px;height:56px;border-radius:14px;background:var(--mint-dim);border:1px solid var(--mint-border);display:grid;place-items:center;color:var(--mint);margin:0 auto 18px;}
.empty h3{font-family:var(--display);font-weight:700;font-size:18px;margin-bottom:8px;}
.empty p{font-size:13.5px;color:var(--ink2);max-width:38ch;margin:0 auto 20px;line-height:1.5;}

@media(max-width:1080px){
  .app{grid-template-columns:1fr;}
  .side{position:static;height:auto;flex-direction:row;flex-wrap:wrap;align-items:center;gap:16px;}
  .nav{flex-direction:row;flex:1;}
  .nav-sec{display:none;}
  .side-foot{margin-top:0;}
}
@media(max-width:860px){
  .main{padding:22px 18px;}
  .stats{grid-template-columns:1fr 1fr;}
  .hide-sm{display:none;}
  thead th.hide-sm{display:none;}
}
</style>
</head>
<body>
<div class="app" data-screen-label="tracker">

  <!-- NAV -->
  <aside class="side">
    <a class="brand-mark" href="landing.html">
      <div class="brand-logo">R</div>
      <div><div class="brand-name">ResumSync</div><div class="brand-tag">by VisualizePro</div></div>
    </a>
    <div class="nav">
      <div class="nav-sec">Workspace</div>
      <a class="nav-item" href="app.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> New analysis</a>
      <a class="nav-item on" href="tracker.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg> Applications</a>
      <a class="nav-item" href="rewriter.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg> Resume rewriter</a>
      <a class="nav-item" href="cover-letter.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg> Cover letters</a>
    </div>
    <div class="side-foot">
      <a class="cta-side" href="app.html">+ New analysis</a>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="page-head">
      <div>
        <h1>Applications</h1>
        <p id="subline">Every role you've analysed — resume, cover letter, score and status in one place.</p>
      </div>
      <div class="head-actions">
        <a class="btn btn-ghost" href="app.html">Export CSV</a>
        <a class="btn btn-mint" href="app.html">+ New analysis</a>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats" id="stats"></div>

    <!-- TABLE -->
    <div class="table-card">
      <div class="table-top">
        <div class="table-title">All applications</div>
        <div class="table-tools">
          <div class="search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
            <input id="search" type="text" placeholder="Search role or company…"/>
          </div>
          <div class="filters" id="filters">
            <button class="filter on" data-f="all">All</button>
            <button class="filter" data-f="draft">Draft</button>
            <button class="filter" data-f="applied">Applied</button>
            <button class="filter" data-f="interview">Interview</button>
          </div>
        </div>
      </div>
      <div id="tableHost"></div>
    </div>
  </main>
</div>

<script>
(function(){
  var S=window.RSStore;
  var apps=S?S.load():[];
  var STATUS=S?S.STATUS:{};
  var ORDER=S?S.ORDER:[];
  var filter='all';
  var search='';
  var sort={key:'updated',dir:1};

  function ago(d){if(d===0)return'Today';if(d===1)return'Yesterday';if(d<7)return d+' days ago';if(d<14)return'1 week ago';return Math.floor(d/7)+' weeks ago';}
  function fileIcon(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>';}
  function folderIcon(){return '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>';}
  function chevron(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';}

  function fileLine(d,kind){
    if(!d)return '<div class="file-line"><span class="fic">'+fileIcon()+'</span><span class="fname none">No '+kind+' yet</span></div>';
    var badge=d.sent?'<span class="sent-badge yes">↑ Sent</span>':'<span class="sent-badge no">Draft</span>';
    return '<div class="file-line has"><span class="fic">'+fileIcon()+'</span><span class="fname" title="'+d.file+'">'+d.file+'</span>'+badge+'</div>';
  }

  function docDetail(a,d,kind,label){
    if(!d){
      var href=kind==='resume'?'rewriter.html':'cover-letter.html';
      var verb=kind==='resume'?'Tailor a resume':'Generate a cover letter';
      return '<div class="doc-detail"><div class="dd-h"><span class="dd-kind">'+label+'</span></div>'+
        '<div class="dd-empty">No '+kind+' attached to this application yet.'+
        '<a class="dd-gen" href="'+href+'">'+verb+' →</a></div></div>';
    }
    var status=d.sent
      ? '<span class="dd-status">Sent <b>'+d.date+'</b></span>'
      : '<span class="dd-status"><span class="muted">Not sent yet</span></span>'+
        '<button class="mark-sent" data-mark="'+kind+'" data-id="'+a.id+'">Mark as sent</button>';
    return '<div class="doc-detail">'+
      '<div class="dd-h"><span class="dd-kind">'+label+'</span></div>'+
      '<div class="dd-file"><span class="dfi">'+fileIcon()+'</span><span class="dd-fname">'+d.file+'</span></div>'+
      '<div class="dd-loc"><span class="lic">'+folderIcon()+'</span><span class="lpath" title="'+d.path+d.file+'">'+d.path+'</span><button class="dd-copy" data-copy="'+d.path+d.file+'">Copy path</button></div>'+
      '<div class="dd-foot">'+status+'</div></div>';
  }

  function renderStats(){
    var total=apps.length;
    var interview=apps.filter(function(a){return a.status==='interview';}).length;
    var applied=apps.filter(function(a){return a.status==='applied'||a.status==='interview'||a.status==='offer';}).length;
    var avg=total?Math.round(apps.reduce(function(s,a){return s+(a.tailored||a.score);},0)/total):0;
    var cards=[
      {v:total,l:'Tracked',c:''},
      {v:applied,l:'Applied',c:'blue'},
      {v:interview,l:'Interviews',c:'amber'},
      {v:avg,l:'Avg match',c:'mint'}
    ];
    document.getElementById('stats').innerHTML=cards.map(function(c){
      return '<div class="stat"><div class="v '+c.c+'">'+c.v+'</div><div class="l">'+c.l+'</div></div>';
    }).join('');
  }

  function renderTable(){
    var rows=apps.filter(function(a){return filter==='all'||a.status===filter;});
    if(search){
      var q=search.toLowerCase();
      rows=rows.filter(function(a){return (a.role+' '+a.company).toLowerCase().indexOf(q)>-1;});
    }
    rows.sort(function(a,b){
      var d=0;
      if(sort.key==='match')d=(a.tailored||a.score)-(b.tailored||b.score);
      else if(sort.key==='company')d=a.company.localeCompare(b.company);
      else if(sort.key==='status')d=ORDER.indexOf(a.status)-ORDER.indexOf(b.status);
      else d=a.days-b.days; // updated: most recent activity first
      if(d===0)d=a.days-b.days;
      return d*sort.dir;
    });
    var host=document.getElementById('tableHost');
    if(!rows.length){
      var msg=search?'No applications match “'+search+'”.':'Analyse a job posting and save it to start tracking. Everything lands here automatically.';
      host.innerHTML='<div class="empty"><div class="ei"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></div><h3>No applications here yet</h3><p>'+msg+'</p><a class="btn btn-mint" href="app.html" style="display:inline-flex">+ New analysis</a></div>';
      return;
    }
    var body=rows.map(function(a){
      var st=STATUS[a.status]||{label:a.status,color:'#9fb6a8',bg:'rgba(159,182,168,0.12)'};
      var up=(a.tailored&&a.tailored>a.score)?'<span class="score-up">+'+(a.tailored-a.score)+'</span>':'';
      var shownScore=a.tailored||a.score;
      var appliedCell=a.applied?'<span>'+a.applied+'</span>':'<span class="none">—</span>';
      var main='<tr data-id="'+a.id+'">'+
        '<td><div class="role-cell"><div class="co-logo" style="background:'+a.color+'">'+a.logo+'</div>'+
          '<div><div class="role-t">'+a.role+(a.live?'<span class="new-badge">Active</span>':'')+'</div><div class="role-c">'+a.company+'</div></div></div></td>'+
        '<td><div class="files">'+fileLine(a.resume,'resume')+fileLine(a.cover,'cover letter')+'</div></td>'+
        '<td class="center"><div class="score-cell"><span class="score-num">'+shownScore+'</span>'+up+'</div></td>'+
        '<td><span class="status" data-status="'+a.id+'" style="color:'+st.color+';background:'+st.bg+'"><span class="d"></span>'+st.label+'<span class="caret">▾</span></span></td>'+
        '<td class="applied-cell hide-sm">'+appliedCell+'</td>'+
        '<td class="row-act"><button class="expand-btn" data-expand="'+a.id+'" title="Files &amp; details">'+chevron()+'</button></td>'+
      '</tr>';
      var detail='<tr class="detail-row" data-detail="'+a.id+'" style="display:none"><td colspan="6"><div class="detail-inner">'+
        docDetail(a,a.resume,'resume','Resume sent')+
        docDetail(a,a.cover,'cover','Cover letter sent')+
      '</div></td></tr>';
      return main+detail;
    }).join('');
    function th(key,label,extra){
      var act=sort.key===key?' act':'';
      var ind=sort.key===key?(sort.dir<0?'▲':'▼'):'';
      return '<th class="sortable'+act+(extra||'')+'" data-sort="'+key+'">'+label+'<span class="sort-ind">'+ind+'</span></th>';
    }
    host.innerHTML='<table><thead><tr>'+
      th('company','Role')+
      '<th>Documents</th>'+
      th('match','Match',' center')+
      th('status','Status')+
      th('updated','Applied',' hide-sm')+
      '<th></th>'+
      '</tr></thead><tbody>'+body+'</tbody></table>';
  }

  function openDetailIds(){
    return [].slice.call(document.querySelectorAll('.detail-row')).filter(function(r){return r.style.display!=='none';}).map(function(r){return r.getAttribute('data-detail');});
  }
  function restoreDetails(ids){
    ids.forEach(function(id){var dr=document.querySelector('[data-detail="'+id+'"]');if(dr){dr.style.display='table-row';var tr=dr.previousElementSibling;if(tr)tr.classList.add('expanded');}});
  }
  function rerender(){
    var ids=openDetailIds();
    renderStats();renderTable();
    restoreDetails(ids);
  }

  // status stage menu
  var menuEl=null;
  function closeMenu(){if(menuEl){menuEl.remove();menuEl=null;}}
  function openMenu(pill,id){
    closeMenu();
    var a=apps.find(function(x){return x.id===id;});
    menuEl=document.createElement('div');
    menuEl.className='status-menu';
    menuEl.innerHTML='<div class="sm-h">Move to stage</div>'+ORDER.map(function(k){
      var s=STATUS[k];var cur=a.status===k;
      return '<button data-set="'+k+'" data-id="'+id+'" class="'+(cur?'cur':'')+'"><span class="sd" style="background:'+s.color+'"></span>'+s.label+(cur?'<span class="ck">✓</span>':'')+'</button>';
    }).join('');
    document.body.appendChild(menuEl);
    var r=pill.getBoundingClientRect();
    var top=r.bottom+6, left=r.left;
    if(top+menuEl.offsetHeight>window.innerHeight-10)top=r.top-menuEl.offsetHeight-6;
    if(left+menuEl.offsetWidth>window.innerWidth-10)left=window.innerWidth-menuEl.offsetWidth-10;
    menuEl.style.top=top+'px';menuEl.style.left=left+'px';
  }

  // delegated interactions
  document.getElementById('tableHost').addEventListener('click',function(e){
    var sortTh=e.target.closest('[data-sort]');
    if(sortTh){
      var k=sortTh.getAttribute('data-sort');
      if(sort.key===k)sort.dir*=-1; else {sort.key=k;sort.dir=(k==='company')?1:-1;}
      rerender();return;
    }
    var pill=e.target.closest('[data-status]');
    if(pill){e.stopPropagation();openMenu(pill,pill.getAttribute('data-status'));return;}
    var ex=e.target.closest('[data-expand]');
    if(ex){
      var id=ex.getAttribute('data-expand');
      var dr=document.querySelector('[data-detail="'+id+'"]');
      var tr=ex.closest('tr');
      var open=dr.style.display==='none';
      dr.style.display=open?'table-row':'none';
      tr.classList.toggle('expanded',open);
      return;
    }
    var mk=e.target.closest('[data-mark]');
    if(mk){
      RSStore.markSent(mk.getAttribute('data-id'),mk.getAttribute('data-mark'),'Today');
      apps=RSStore.load();rerender();return;
    }
    var cp=e.target.closest('[data-copy]');
    if(cp){
      var t=cp.getAttribute('data-copy');
      if(navigator.clipboard)navigator.clipboard.writeText(t).catch(function(){});
      var old=cp.textContent;cp.textContent='Copied!';setTimeout(function(){cp.textContent=old;},1400);
      return;
    }
  });

  // pick a stage from the menu
  document.addEventListener('click',function(e){
    var set=e.target.closest('[data-set]');
    if(set){
      RSStore.setStatus(set.getAttribute('data-id'),set.getAttribute('data-set'),'Today');
      apps=RSStore.load();closeMenu();rerender();return;
    }
    if(menuEl&&!e.target.closest('.status-menu')&&!e.target.closest('[data-status]'))closeMenu();
  });
  window.addEventListener('resize',closeMenu);

  document.getElementById('search').addEventListener('input',function(e){
    search=e.target.value.trim();rerender();
  });

  document.getElementById('filters').addEventListener('click',function(e){
    var b=e.target.closest('.filter');if(!b)return;
    filter=b.dataset.f;
    document.querySelectorAll('.filter').forEach(function(x){x.classList.toggle('on',x===b);});
    rerender();
  });

  renderStats();renderTable();
})();
</script>
</body>
</html>
